name: helpers

on:
  push:
  pull_request:
  # workflow_call:
  #   inputs:
  #     certbot:
  #       required: false
  #       type: bool
  #     fail2ban:
  #       required: false
  #       type: bool

jobs:
  certbot:
    runs-on: ubuntu-latest
    steps:
      - name: Install go
        uses: actions/setup-go@v5
        with:
          go-version: '^1.23.3'

      - name: Setup pebble for mock certs
        shell: bash
        run: |-
          cd /tmp
          git clone https://github.com/letsencrypt/pebble/

          cd pebble
          go install ./cmd/pebble
          sed -ie 's/"httpPort"\: .*/"httpPort"\: 80,/g' test/config/pebble-config.json
          sed -ie 's/"tlsPort"\: .*/"tlsPort"\: 443,/g' test/config/pebble-config.json
          cat test/config/pebble-config.json

          pebble_ca=$(realpath test/certs/pebble.minica.pem)
          echo "pebble_ca_path=$pebble_ca" >> $GITHUB_ENV
          echo "$HOME/go/bin" >> $GITHUB_PATH
          pebble -config test/config/pebble-config.json > /dev/null 2>&1 &
          
      - name: Test certbot
        shell: bash
        run: |-
          echo "127.0.0.201 $DOMAIN $SUBDOMAIN.$DOMAIN" | sudo tee -a /etc/hosts
          sudo cat /etc/hosts
          sudo apt install python3-certbot -y
          sudo REQUESTS_CA_BUNDLE=$CA_BUNDLE certbot -n --standalone \
            --agree-tos --redirect certonly -d $DOMAIN -d $SUBDOMAIN.$DOMAIN \
            -m $SOA_EMAIL --server https://localhost:14000/dir
        env:
          DOMAIN: example.com
          SUBDOMAIN: test
          SOA_EMAIL: test@example.com
          CA_BUNDLE: ${{ env.pebble_ca_path }}
