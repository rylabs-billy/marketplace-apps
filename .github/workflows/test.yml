name: test

on:
  workflow_call:
    inputs:
      app-name:
        description: "Marketplace app name"
        required: true
        type: string
      platform:
        description: "OS image"
        required: false
        default: ubuntu-latest
        type: string
      certbot:
        description: "Enable certbot testing helper"
        required: false
        type: boolean

jobs:
  test:
    runs-on: ${{ inputs.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set git repo and branch environment variables
        shell: bash
        run: |-
          echo "[info] git repo: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY"
          echo "GIT_REPO=$GITHUB_SERVER_URL/$GITHUB_REPOSITORY" >> $GITHUB_ENV

          if [ "$GITHUB_EVENT_NAME" == "pull_request" ]; then
            BRANCH="$GITHUB_BASE_REF"
          elif [ "$GITHUB_REF_NAME" != "main" ]; then
            BRANCH="$GITHUB_REF_NAME"
          fi

          echo "[info] git branch: $BRANCH"
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV

      # - name: Setup tmate session for debugging
      #   uses: mxschmitt/action-tmate@v3
      #   # if: ${{ !cancelled() && github.event_name == 'workflow_dispatch' && inputs.debug_enabled }}
      #   with:
      #     detached: true

      - name: Set test UDFs
        shell: bash
        run: ./deployment_scripts/linode-marketplace-$APP/test-vars.sh
        env:
          APP: ${{ inputs.app-name }}
          TOKEN_PASSWORD: ${{ secrets.LINODE_TOKEN }}

      - name: Mock certbot
        if: ${{ inputs.certbot == true }}
        run: |-
          sudo -E ./lib/certbot.sh
          # certbot:configure
          # export -f certbot

      - name: Deploy playbook
        shell: bash
        run: |-
          # echo "TRYING WITH SUDO"
          # sudo -E ./lib/certbot.sh
          # tail ~/.bashrc && sudo tail ~/.bashrc
          # sudo -E ./lib/test.sh
          # echo "TRYING WITHOUT SUDO"
          # ./lib/test.sh
          sudo -E ./deployment_scripts/linode-marketplace-$APP/$APP-deploy.sh
        env:
          APP: ${{ inputs.app-name }}
          TOKEN_PASSWORD: ${{ secrets.LINODE_TOKEN }}
          CA_BUNDLE: ${{ env.CA_BUNDLE }}

      - name: Validate playbook success
        shell: bash
        run: |-
          if [ -n "$PLAYBOOK_FAIL" ]; then
            OUTPUT=$(cat /var/log/stackscript.log | grep -i failed | tail)
            echo -e "::error title=playbook failed::$OUTPUT\n"
            exit 1
          fi
